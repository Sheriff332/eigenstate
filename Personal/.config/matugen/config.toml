[config]
version_check = false
fallback_color = "#ffbf9b"
prefer = "closest-to-fallback"
caching = false
expr_prefix = "{{"
expr_postfix = "}}"
block_prefix = "<*"
block_postfix = "*>"
contrast = 1.0
source_color_index = 1

[config.wallpaper]
set = true
command = "awww img --transition-type center {{ image }}"

[config.custom_colors]
red = "#ff0000"
blue = "#0000ff"
green = "#00ff00"

[templates.kitty]
input_path = "~/.config/matugen/templates/kitty.conf"
output_path = "~/.config/kitty/current-theme.conf"
post_hook = "pkill -USR1 kitty"

[templates.hyprland]
input_path = "~/.config/matugen/templates/hyprland.lua"
output_path = "~/.config/hypr/hyprland.lua"
post_hook = "hyprctl reload"

[templates.vesktop]
input_path = "~/.config/matugen/templates/vesktop.theme.css"
output_path = "~/.config/vesktop/themes/system24.theme.css"
post_hook = ""

[templates.swayosd]
input_path = "~/.config/matugen/templates/swayosd.css"
output_path = "~/.config/swayosd/style.css"
post_hook = "pkill swayosd-server && swayosd-server &"

[templates.zed]
input_path = "~/.config/matugen/templates/zed.json"
output_path = "~/.config/zed/themes/style.json"
post_hook = ""

[templates.wleave]
input_path = "~/.config/matugen/templates/wleave.css"
output_path = "~/.config/wleave/style.css"
post_hook = ""

[templates.vicinae]
input_path = "~/.config/matugen/templates/vicinae.toml"
output_path = '~/.local/share/vicinae/themes/matugen.toml'
post_hook = "vicinae theme set matugen"

[templates.qt5ct]
input_path = '~/.config/matugen/templates/qtct-colors.conf'
output_path = '~/.config/qt5ct/colors/matugen.conf'
post_hook = "pkill -USR1 -f qt5ct"

[templates.qt6ct]
input_path = '~/.config/matugen/templates/qtct-colors.conf'
output_path = '~/.config/qt6ct/colors/matugen.conf'
post_hook = "pkill -USR1 -f qt6ct"

[templates.starship]
input_path = '~/.config/matugen/templates/starship.toml'
output_path = '~/.config/starship.toml'
post_hook = ""

[templates.freesmlauncher]
input_path = '~/.config/matugen/templates/freesmlauncher.json'
output_path = '~/.local/share/FreesmLauncher/themes/Matugen/theme.json'
post_hook = "pkill -USR1 -f qt6ct"

[templates.hyprlock]
input_path = '~/.config/matugen/templates/hyprlock.conf'
output_path = '~/.config/hypr/hyprlock.conf'
post_hook = ""

[templates.histui]
input_path = '~/.config/matugen/templates/histui-theme.css'
output_path = '~/.config/histui/themes/matugen/theme.css'
post_hook = ""

[templates.mpv]
input_path = '~/.config/matugen/templates/mpv.conf'
output_path = '~/.config/mpv/mpv.conf'
post_hook = ""

[templates.modernz]
input_path = '~/.config/matugen/templates/modernz.conf'
output_path = '~/.config/mpv/script-opts/modernz.conf'
post_hook = ""

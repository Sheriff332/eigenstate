general {
    hide_cursor = true
    disable_loading_bar = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 5

    color = rgba(#0f1416bf)
}

# --- SYSTEM DIGITAL CLOCK ---
label {
    monitor =
    text = $TIME
    color = rgb(#dbf4ff)
    font_size = 85
    font_family = Monocraft

    position = 0, 150
    halign = center
    valign = center
}

# --- THE INPUT FIELD ---
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 3

    font_family = Monocraft
    rounding = 0

    outer_color = rgb(#dbf4ff)
    inner_color = rgba(#2c3134bf)
    font_color = rgb(#ffffff)

    dots_size = 0.3
    dots_spacing = 0.25
    dots_center = true

    fade_on_empty = false
    placeholder_text = <i><span foreground="##000000">Enter Password...</span></i>
    hide_input = false

    check_color = rgb(#f0eeff)
    fail_color = rgb(#ffece9)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>

    position = 0, -40
    halign = center
    valign = center
}

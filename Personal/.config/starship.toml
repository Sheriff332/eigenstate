"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](#f4f59c)\
$os\
$username\
[](bg:#f4f2cc fg:#f4f59c)\
$directory\
[](fg:#f4f2cc bg:#ccfae6)\
$git_branch\
$git_status\
[](fg:#ccfae6 bg:#e6e790)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[](fg:#e6e790 bg:#e6e4bf)\
$docker_context\
[](fg:#e6e4bf bg:#bfecd9)\
$time\
[ ](fg:#bfecd9)\
"""

[username]
show_always = true
style_user = "bg:#f4f59c fg:#000000"
style_root = "bg:#f4f59c fg:#000000"
format = '[$user ]($style)'
disabled = false

[os]
style = "bg:#f4f59c fg:#000000"
disabled = true

[directory]
style = "bg:#f4f2cc fg:#000000"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[c]
symbol = " "
style = "bg:#e6e790 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "bg:#e6e790 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "bg:#e6e4bf fg:#000000"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = " "
style = "bg:#e6e790 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "bg:#e6e790 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "bg:#ccfae6 fg:#000000"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#ccfae6 fg:#000000"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "bg:#e6e790 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:#e6e790 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "bg:#e6e790 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "bg:#e6e790 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "bg:#e6e790 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:#e6e790 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "bg:#e6e790 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#e6e790 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "bg:#e6e790 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#bfecd9 fg:#000000"
format = '[ ♥ $time ]($style)'

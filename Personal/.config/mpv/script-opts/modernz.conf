# ==============================================================================
#                        MODERNZ MATUGEN TEMPLATE
# ==============================================================================

language=default
layout=default
icon_theme=fluent
icon_style=mixed

# We use the default symbols to avoid the ligature text-overlap bug
font=mpv-osd-symbols

idlescreen=yes
window_top_bar=auto
showwindowed=yes
showfullscreen=yes
showonselect=no
showonpause=yes
keeponpause=no
greenandgrumpy=no

hidetimeout=1500
keep_with_cursor=yes
fadeduration=200
fadein=yes
minmousemove=0
deadzonesize=0.75
deadzone_hide=instant
osc_on_seek=yes
osc_on_start=both
mouse_seek_pause=yes
force_seek_tooltip=no

vidscale=auto
scalewindowed=1.0
scalefullscreen=1.0

show_title=yes
title=${media-title}
title_font_size=24
truncate_title=no
chapter_title_font_size=16
cache_info=no
cache_info_speed=no
cache_info_font_size=12

show_chapter_title=yes
chapter_above_title=no
chapter_fmt=%s

timecurrent=yes
timems=no
unicodeminus=no
time_format=dynamic
time_font_size=16
tooltip_font_size=14
speed_font_size=16

show_window_title=no
window_title_font_size=26
window_controls=yes
windowcontrols_independent=yes

sub_margins=yes
osd_margins=no
dynamic_margins=yes

subtitles_button=yes
audio_tracks_button=yes
jump_buttons=yes
jump_amount=10
jump_more_amount=60
jump_icon_number=yes
jump_mode=relative
jump_softrepeat=yes
chapter_skip_buttons=no
track_nextprev_buttons=yes

volume_control=yes
volume_control_type=linear
volumebar_unmute_on_click=no
playlist_button=yes
hide_empty_playlist_button=no
gray_empty_playlist_button=no

fullscreen_button=yes
info_button=yes
ontop_button=yes
ontop_in_topbar=no
screenshot_button=yes

download_button=yes
download_path=~~desktop/mpv

loop_button=yes
shuffle_button=no
speed_button=yes

buttons_always_active=none

playpause_size=28
midbuttons_size=24
sidebuttons_size=24

zoom_control=yes
zoom_in_max=4
zoom_out_min=-1

# --- COLORS AND STYLE (MATUGEN SYNC) ---

# Header/Title Colors
window_title_color=#ffffff
window_controls_color=#ffffff
title_color=#dbf4ff
time_color=#ffffff
chapter_title_color=#ffffff

# Seekbar & Accent Colors (This is the orange you were seeing)
seekbarfg_color=#dbf4ff
seek_handle_color=#dbf4ff
seek_handle_border_color=#dbf4ff
hover_effect_color=#dbf4ff
nibble_color=#dbf4ff
seekbar_cache_color=#bbc4c8
seekbarbg_color=#42484a

# Buttons
side_buttons_color=#ffffff
middle_buttons_color=#ffffff
playpause_color=#ffffff
held_element_color=#dcf4fe

# Thumbnails
thumbnail_box_color=#1b2023
thumbnail_box_outline=#bbc4c8

# --- TRANSPARENCY & RADIUS (ZED/YAZI VIBE) ---

# Set radius to 0 for the sharp, blocky look
thumbnail_box_radius=0
slider_rounded_corners=no

osc_fade_strength=0
fade_blur_strength=0
fade_transparency_strength=0

# --- THE REST ---
hover_effect=size,glow,color,box
button_hover_size=115
button_held_size=100
button_held_box_alpha=18
button_glow_amount=5
slider_hover_size=100
tooltip_hints=yes

seek_handle_size=0.8
seek_handle_border_size=0.42
seek_handle_border_hover_size=0.31
seekbar_height=medium
seekrange=yes
seekrangealpha=150
livemarkers=yes
seekbarkeyframes=yes

nibbles_style=gap
nibbles_top=yes
nibbles_bottom=yes

automatickeyframemode=yes
automatickeyframelimit=600

persistent_progress=no
persistent_progress_height=17
persistent_buffer=no

visibility=auto
visibility_modes=never_auto_always
tick_delay=0.0167
tick_delay_follow_display_fps=no

title_offset=20
title_with_chapter_offset=5
chapter_title_offset=18
chapter_above_title_offset=3
time_codes_offset=0
tooltip_height_offset=5
portrait_window_trigger=950
hide_volume_bar_trigger=1150
osc_height=60
